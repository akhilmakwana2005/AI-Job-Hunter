<!DOCTYPE html>
<html>
<head>
  <title>AI Job Hunter</title>
  <style>
    body { width: 320px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; margin: 0; background-color: #f8fafc; color: #0f172a; }
    h2 { margin-top: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; color: #2563eb; }
    .job-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .job-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .company { color: #64748b; font-size: 12px; }
    button { width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #10b981; color: white; }
    .btn-secondary:hover { background: #059669; }
    .hidden { display: none; }
    .status { font-size: 12px; color: #64748b; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>🚀 AI Job Hunter Agent</h2>
  
  <div id="no-job" class="job-card">
    Please open a LinkedIn Job page to use the agent.
  </div>

  <div id="job-details" class="job-card hidden">
    <div id="job-title" class="job-title">Loading...</div>
    <div id="job-company" class="company">Loading...</div>
  </div>

  <div id="actions" class="hidden">
    <button id="save-job-btn" class="btn-primary">📌 Save to Tracker</button>
    <button id="gen-cover-btn" class="btn-secondary">✨ Generate Cover Letter</button>
  </div>

  <div id="status-msg" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
